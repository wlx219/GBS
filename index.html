        '等级': 'dengji', 'A级': 'Aji', 'B级': 'Bji', 'C级': 'Cji',
        '优质': 'youzhi', '普通': 'putong',
    };

    // Build reverse pinyin index
    const PY_INDEX = {};
    for (const [zh, py] of Object.entries(PY_MAP)) {
        PY_INDEX[zh] = py;
        // Also index by first char for partial
        for (let i = 1; i <= zh.length; i++) {
            const prefix = zh.slice(0, i);
            if (!PY_INDEX[prefix]) PY_INDEX[prefix] = py;
        }
    }

    // Get pinyin of a Chinese string (simple lookup)
    function toPinyin(str) {
        if (!str) return '';
        let result = str;
        for (const [zh, py] of Object.entries(PY_MAP)) {
            result = result.replace(new RegExp(zh, 'g'), py);
        }
        return result;
    }

    // Fuzzy match scoring: higher = better match
    // query: string to match, target: string to match against
    function fuzzyScore(query, target) {
        if (!query || !target) return 0;
        const q = query.toUpperCase(), t = target.toUpperCase();
        // Exact contains (highest)
        if (t.includes(q)) return 100 + (t === q ? 50 : 0);
        // Pinyin match
        const tp = toPinyin(t), qp = toPinyin(q);
        if (tp.includes(qp)) return 90;
        if (tp.includes(qp.slice(0, -1))) return 85;
        // Abbreviation: first letters (GB/T ->GBT)
        const abbrev = t.replace(/[^A-Z0-9]/g, '').toUpperCase();
        if (abbrev.startsWith(q.replace(/[^A-Z0-9]/g, '').toUpperCase())) return 80;
        // Char-by-char fuzzy
        let qi = 0, score = 0, consecutive = 0, lastIdx = -1;
        for (let i = 0; i < t.length && qi < q.length; i++) {
            if (t[i] === q[qi]) {
                qi++;
                consecutive++;
                if (lastIdx === i - 1) score += 2 * consecutive; // consecutive bonus
                else score += 5;
                lastIdx = i;
            }
        }
        if (qi < q.length) return 0; // not all chars found
        return score;
    }

    function fuzzySearch(query, model) {
        const fields = [
            model.standardNo || '',
            model.name || '',
            model.id || '',
            ...(model.tags || []),
            ...(model.dimensions?.map(d => d.param + ' ' + d.value) || []),
            toPinyin(model.name || ''),       // pinyin of name
            toPinyin(model.standardNo || ''), // pinyin of standardNo
        ];
        const target = fields.join(' ').toUpperCase();
        const q = query.toUpperCase();
        // Fast exact checks first
        if (target.includes(q)) return { score: 100 + (target.startsWith(q) ? 20 : 0), matched: q };
        // Abbreviation
        const abbrev = target.replace(/[^A-Z0-9]/g, '');
        if (abbrev.startsWith(q.replace(/[^A-Z0-9]/g, ''))) return { score: 90, matched: q };
        // Pinyin
        const pyTarget = toPinyin(target), pyQuery = toPinyin(q);
        if (pyTarget.includes(pyQuery)) return { score: 85, matched: q };
        // Fuzzy
        const fs = fuzzyScore(q, target);
        return { score: fs, matched: q };
    }

    function searchStandard() {
        const rawQuery = document.getElementById('searchInput').value.trim();
        if (!rawQuery) return;
        const query = rawQuery.toUpperCase();

        const results = [];
        const stdNoMap = {};

        for (const [catId, models] of Object.entries(standardsData)) {
            for (const model of models) {
                const { score } = fuzzySearch(rawQuery, model);
                if (score > 0) {
                    const key = `${catId}:${model.standardNo}`;
                    if (!stdNoMap[key]) {
                        stdNoMap[key] = { ...model, categoryId: catId, score, count: 1 };
                    } else {
                        stdNoMap[key].count++;
                        stdNoMap[key].score = Math.max(stdNoMap[key].score, score);
                    }
                }
            }
        }

        const sorted = Object.values(stdNoMap)
            .filter(r => r.score > 0)
            .sort((a, b) => b.score - a.score);

    // ==================== Advanced Filter ====================
    let filterState = {
        industry: [],    // HG/HB/JB/GB
        type: [],        // 螺栓/螺母/垫圈 etc.
        thread: [],      // M6/M8/M10 etc.
        standard: []      // specific standard numbers
    };
    let filterPanelOpen = false;
    let filterInitialized = false;

    // Build filter options dynamically from data
    function buildFilterOptions() {
        const options = { industry: new Set(), type: new Set(), thread: new Set(), standard: new Set() };
        const threadPatt = /^M?(\d+)/i;
        for (const [catId, models] of Object.entries(standardsData)) {
            for (const item of (models || [])) {
                const name = item.name || '';
                const stdNo = item.standardNo || '';
                // Industry
                if (catId === 'hg') options.industry.add('HG化工');
                else if (catId === 'hb') options.industry.add('HB航空');
                else if (catId === 'jb') options.industry.add('JB机械');
                else options.industry.add('GB国标');
                // Type: derive from name
                if (/螺[母钉塞]|luomu|screw/i.test(name)) options.type.add('螺钉/螺栓');
                else if (/螺母|luomu/i.test(name)) options.type.add('螺母');
                else if (/垫[片圈]|wash/i.test(name)) options.type.add('垫圈/垫片');
                else if (/轴[承箱]|bear/i.test(name)) options.type.add('轴承');
                else if (/法兰|flang/i.test(name)) options.type.add('法兰');
                else if (/密[封垫]|seal|gasket/i.test(name)) options.type.add('密封件');
                else if (/弹[簧]|spring/i.test(name)) options.type.add('弹簧');
                else if (/键|key/i.test(name)) options.type.add('键');
                else if (/齿[轮]|gear/i.test(name)) options.type.add('齿轮');
                else if (/液[压]|hydraulic/i.test(name)) options.type.add('液压件');
                else if (/铆[钉]|rivet/i.test(name)) options.type.add('铆钉');
                else if (/联轴|coupling/i.test(name)) options.type.add('联轴器');
                else options.type.add('其他');
                // Thread size
                const tmatch = stdNo.match(threadPatt) || name.match(threadPatt);
                if (tmatch) options.thread.add('M' + tmatch[1]);
                // Standard no
                if (stdNo) {
                    const base = stdNo.replace(/\/.*$/, '').replace(/\s/g, '');
                    if (base) options.standard.add(base);
                }
            }
        }
        return {
            industry: Array.from(options.industry).sort(),
            type: Array.from(options.type).sort(),
            thread: Array.from(options.thread).sort((a,b) => parseInt(a.slice(1)) - parseInt(b.slice(1))).filter(t => /^\d+$/.test(t.slice(1))).slice(0, 20),
            standard: Array.from(options.standard).sort().slice(0, 30)
        };
    }

    let filterOptions = null;

    function toggleFilterPanel() {
        filterPanelOpen = !filterPanelOpen;
        const panel = document.getElementById('filterPanel');
        const icon = document.getElementById('filterToggleIcon');
        panel.classList.toggle('open', filterPanelOpen);
        icon.classList.toggle('open', filterPanelOpen);
        icon.textContent = filterPanelOpen ? '▲' : '▼';
        if (filterPanelOpen && !filterInitialized) {
            filterOptions = buildFilterOptions();
            renderFilterPanel();
            filterInitialized = true;
        }
    }

    function renderFilterPanel() {
        if (!filterOptions) return;
        const panel = document.getElementById('filterPanel');
        const groups = [
            { key: 'industry', label: '🏭 行业分类', values: filterOptions.industry },
            { key: 'type', label: '🔩 零件类型', values: filterOptions.type },
            { key: 'thread', label: '📏 螺纹规格', values: filterOptions.thread },
        ];

        let html = groups.map(g => `
            <div class="filter-group" id="filterGroup_${g.key}">
                <div class="filter-group-header" onclick="toggleFilterGroup('${g.key}')">
                    <span>${g.label}</span>
                    <span class="filter-group-arrow" id="filterArrow_${g.key}">▼</span>
                </div>
                <div class="filter-group-body" id="filterBody_${g.key}">
                    ${g.values.map(v => `
                        <label class="filter-chip ${filterState[g.key].includes(v) ? 'active' : ''}"
                               onclick="toggleFilterChip('${g.key}', '${v.replace(/'/g, "\\'")}')">
                            ${v}
                        </label>`).join('')}
                </div>
            </div>`).join('');

        // Actions
        html += `
            <div class="filter-actions">
                <button class="filter-action-btn reset" onclick="resetFilters()">🔄 重置</button>
                <button class="filter-action-btn" onclick="applyFilters()">✓ 应用筛选</button>
            </div>
            <div class="filter-match-count" id="filterMatchCount">
                点击"应用筛选"查看符合条件的数据
            </div>`;

        panel.innerHTML = html;
        // Auto-open first group
        toggleFilterGroup('industry');
    }

    function toggleFilterGroup(key) {
        const body = document.getElementById('filterBody_' + key);
        const arrow = document.getElementById('filterArrow_' + key);
        body.classList.toggle('open');
        arrow.classList.toggle('open');
    }

    function toggleFilterChip(key, value) {
        const arr = filterState[key];
        const idx = arr.indexOf(value);
        if (idx >= 0) arr.splice(idx, 1);
        else arr.push(value);
        updateFilterBadge();
        // Update chip UI without full re-render
        const chips = document.querySelectorAll(`#filterBody_${key} .filter-chip`);
        chips.forEach(chip => {
            const txt = chip.textContent.trim();
            if (arr.includes(txt)) chip.classList.add('active');
            else chip.classList.remove('active');
        });
    }

    function updateFilterBadge() {
        const total = filterState.industry.length + filterState.type.length + filterState.thread.length + filterState.standard.length;
        const badge = document.getElementById('filterBadge');
        badge.textContent = total;
        badge.classList.toggle('show', total > 0);
    }

    function resetFilters() {
        filterState = { industry: [], type: [], thread: [], standard: [] };
        updateFilterBadge();
        if (filterOptions) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        }
        document.getElementById('filterMatchCount').innerHTML = '已重置，点击"应用筛选"查看全部数据';
    }

    function applyFilters() {
        const hasIndustry = filterState.industry.length > 0;
        const hasType = filterState.type.length > 0;
        const hasThread = filterState.thread.length > 0;
        const hasStd = filterState.standard.length > 0;
        const hasAny = hasIndustry || hasType || hasThread || hasStd;

        if (!hasAny) {
            // Show all
            currentFilter = null;
        } else {
            currentFilter = {};
            if (hasIndustry) currentFilter.industry = [...filterState.industry];
            if (hasType) currentFilter.type = [...filterState.type];
            if (hasThread) currentFilter.thread = [...filterState.thread];
            if (hasStd) currentFilter.standard = [...filterState.standard];
        }

        // Count matches
        let matchCount = 0;
        const catIds = Object.keys(standardsData);
        for (const catId of catIds) {
            const models = standardsData[catId] || [];
            for (const item of models) {
                if (!hasAny || matchesFilter(item, catId)) matchCount++;
            }
        }

        const countEl = document.getElementById('filterMatchCount');
        countEl.innerHTML = hasAny
            ? `符合条件: <strong>${matchCount.toLocaleString()}</strong> 条数据`
            : `全部数据: <strong>${matchCount.toLocaleString()}</strong> 条`;

        // Refresh category list to reflect filtered count
        if (currentCategory) {
            renderCategories();
            renderModelList(currentCategory);
        }
    }

    function matchesFilter(item, catId) {
        if (!currentFilter) return true;
        const name = item.name || '';
        const stdNo = item.standardNo || '';

        if (currentFilter.industry && currentFilter.industry.length > 0) {
            let itemIndustry = 'GB国标';
            if (catId === 'hg') itemIndustry = 'HG化工';
            else if (catId === 'hb') itemIndustry = 'HB航空';
            else if (catId === 'jb') itemIndustry = 'JB机械';
            if (!currentFilter.industry.includes(itemIndustry)) return false;
        }

        if (currentFilter.type && currentFilter.type.length > 0) {
            let itemType = '其他';
            if (/螺[母钉塞]|screw/i.test(name)) itemType = '螺钉/螺栓';
            else if (/螺母/i.test(name)) itemType = '螺母';
            else if (/垫[片圈]/i.test(name)) itemType = '垫圈/垫片';
            else if (/轴[承箱]|bear/i.test(name)) itemType = '轴承';
            else if (/法兰|flang/i.test(name)) itemType = '法兰';
            else if (/密[封垫]|seal|gasket/i.test(name)) itemType = '密封件';
            else if (/弹[簧]/i.test(name)) itemType = '弹簧';
            else if (/键|key/i.test(name)) itemType = '键';
            else if (/齿[轮]|gear/i.test(name)) itemType = '齿轮';
            else if (/液[压]/i.test(name)) itemType = '液压件';
            else if (/铆[钉]/i.test(name)) itemType = '铆钉';
            else if (/联轴/i.test(name)) itemType = '联轴器';
            if (!currentFilter.type.includes(itemType)) return false;
        }

        if (currentFilter.thread && currentFilter.thread.length > 0) {
            const tmatch = stdNo.match(/M?(\d+)/i) || name.match(/M?(\d+)/i);
            if (!tmatch) return false;
            const t = 'M' + tmatch[1];
            if (!currentFilter.thread.includes(t)) return false;
        }

        if (currentFilter.standard && currentFilter.standard.length > 0) {
            const base = stdNo.replace(/\/.*$/, '').replace(/\s/g, '');
            if (!base || !currentFilter.standard.includes(base)) return false;
        }

        return true;
    }

    let currentFilter = null; // null = no filter

    // ==================== Favorites & History ====================
    let favorites = JSON.parse(localStorage.getItem('stdFavorites') || '[]');
    let historyList = JSON.parse(localStorage.getItem('stdHistory') || '[]');
    let currentFavHistTab = 'fav';

    function updateFavBadge() {
        const badge = document.getElementById('favBadge');
        badge.textContent = favorites.length;
        badge.classList.toggle('show', favorites.length > 0);
    }

    function toggleFavorite(stdNo, categoryId) {
        const idx = favorites.findIndex(s => s.stdNo === stdNo);
        if (idx >= 0) {
            favorites.splice(idx, 1);
        } else {
            // Get name for display
            const grouped = groupedData[categoryId];
            const items = grouped ? grouped[stdNo] : [];
            const name = items.length > 0 ? items[0].name : stdNo;
            const category = items.length > 0 ? items[0].category : '';
            favorites.push({ stdNo, categoryId, name, category, addedAt: Date.now() });
        }
        localStorage.setItem('stdFavorites', JSON.stringify(favorites));
        updateFavBadge();
        if (currentCategory) renderModelList(currentCategory);
    }

    function toggleFavoriteDetail() {
        if (!currentStandardNo || !currentCategory) return;
        toggleFavorite(currentStandardNo, currentCategory);
        // Update detail button
        const favBtn = document.getElementById('detailFavBtn');
        if (favBtn) {
            const isFav = favorites.some(s => s.stdNo === currentStandardNo);
            favBtn.textContent = isFav ? '★' : '☆';
            favBtn.classList.toggle('favorited', isFav);
        }
    }

    function isFavorited(stdNo) {
        return favorites.some(s => s.stdNo === stdNo);
    }

    function toggleFavHistPanel(initialTab) {
        const panel = document.getElementById('favHistPanel');
        const overlay = document.getElementById('favHistOverlay');
        if (!panel.classList.contains('open') && initialTab) {
            currentFavHistTab = initialTab;
        }
        panel.classList.toggle('open');
        overlay.classList.toggle('show');
        switchFavHistTab(currentFavHistTab);
    }

    function closeFavHistPanel() {
        document.getElementById('favHistPanel').classList.remove('open');
        document.getElementById('favHistOverlay').classList.remove('show');
    }

    function switchFavHistTab(tab) {
        currentFavHistTab = tab;
        document.getElementById('tabFav').classList.toggle('active', tab === 'fav');
        document.getElementById('tabHist').classList.toggle('active', tab === 'hist');
        document.getElementById('favHistPanelTitle').innerHTML = tab === 'fav'
            ? '⭐ 收藏 <span class="count">(' + favorites.length + ')</span>'
            : '🕐 历史 <span class="count">(' + historyList.length + ')</span>';
        renderFavHistPanel();
        // Update footer
        const footer = document.getElementById('favHistPanelFooter');
        if (tab === 'fav') {
            footer.innerHTML = `
                <button class="compare-action-btn" onclick="exportFavorites()">📥 导出</button>
                <button class="compare-action-btn" onclick="clearFavorites()">🗑️ 清空</button>`;
        } else {
            footer.innerHTML = `
                <button class="compare-action-btn" onclick="exportHistory()">📥 导出</button>
                <button class="compare-action-btn" onclick="clearHistory()">🗑️ 清空</button>`;
        }
    }

    function renderFavHistPanel() {
        const body = document.getElementById('favHistPanelBody');
        if (currentFavHistTab === 'fav') {
            renderFavorites(body);
        } else {
            renderHistory(body);
        }
    }

    function renderFavorites(body) {
        if (favorites.length === 0) {
            body.innerHTML = `<div class="fav-hist-empty">
                <div class="icon">⭐</div>
                <p>暂无收藏</p>
                <p style="font-size:12px;margin-top:8px;">点击列表中的 ☆ 按钮收藏常用标准件</p>
            </div>`;
            return;
        }
        body.innerHTML = favorites.map(f => `
            <div class="fav-item" onclick="openFavItem('${f.stdNo.replace(/'/g, "\\'")}', '${f.categoryId}')">
                <span class="fav-icon">★</span>
                <div class="info">
                    <div class="stdno">${f.stdNo}</div>
                    <div class="fname">${f.name}</div>
                </div>
                <button class="fav-remove" onclick="event.stopPropagation(); removeFavorite('${f.stdNo.replace(/'/g, "\\'")}')" title="移除">×</button>
            </div>`).join('');
    }

    function renderHistory(body) {
        if (historyList.length === 0) {
            body.innerHTML = `<div class="fav-hist-empty">
                <div class="icon">🕐</div>
                <p>暂无历史记录</p>
                <p style="font-size:12px;margin-top:8px;">查看过的规格件会显示在这里</p>
            </div>`;
            return;
        }
        body.innerHTML = historyList.map(h => {
            const d = new Date(h.time);
            const timeStr = d.getFullYear() === new Date().getFullYear()
                ? `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`
                : `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
            return `
            <div class="hist-item" onclick="openFavItem('${h.stdNo.replace(/'/g, "\\'")}', '${h.categoryId}')">
                <span class="hist-time">${timeStr}</span>
                <div class="info">
                    <div class="stdno">${h.stdNo}</div>
                    <div class="fname">${h.name}</div>
                </div>
            </div>`;
        }).join('');
    }

    function openFavItem(stdNo, categoryId) {
        closeFavHistPanel();
        selectCategory(categoryId);
        selectStandard(stdNo, categoryId);
    }

    function removeFavorite(stdNo) {
        favorites = favorites.filter(s => s.stdNo !== stdNo);
        localStorage.setItem('stdFavorites', JSON.stringify(favorites));
        updateFavBadge();
        renderFavHistPanel();
        if (currentCategory) renderModelList(currentCategory);
    }

    function clearFavorites() {
        if (favorites.length === 0) return;
        if (!confirm('确定清空所有收藏？')) return;
        favorites = [];
        localStorage.setItem('stdFavorites', JSON.stringify(favorites));
        updateFavBadge();
        renderFavHistPanel();
        if (currentCategory) renderModelList(currentCategory);
    }

    function clearHistory() {
        if (historyList.length === 0) return;
        if (!confirm('确定清空所有历史？')) return;
        historyList = [];
        localStorage.setItem('stdHistory', JSON.stringify(historyList));
        renderFavHistPanel();
    }

    function exportFavorites() {
        if (favorites.length === 0) { alert('暂无收藏可导出'); return; }
        const txt = favorites.map(f => `${f.stdNo}\t${f.name}\t${f.category || ''}`).join('\n');
        downloadText('\uFEFF' + '标准号\t名称\t分类\n' + txt, 'favorites.txt');
    }

    function exportHistory() {
        if (historyList.length === 0) { alert('暂无历史可导出'); return; }
        const txt = historyList.map(h => {
            const d = new Date(h.time);
            return `${d.toLocaleString()}\t${h.stdNo}\t${h.name}`;
        }).join('\n');
        downloadText('\uFEFF' + '时间\t标准号\t名称\n' + txt, 'history.txt');
    }

    function downloadText(content, filename) {
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
    }

    function addToHistory(stdNo, categoryId) {
        const grouped = groupedData[categoryId];
        const items = grouped ? grouped[stdNo] : [];
        const name = items.length > 0 ? items[0].name : stdNo;
        // Remove duplicate if exists
        historyList = historyList.filter(h => !(h.stdNo === stdNo && h.categoryId === categoryId));
        historyList.unshift({ stdNo, categoryId, name, time: Date.now() });
        historyList = historyList.slice(0, 50); // keep last 50
        localStorage.setItem('stdHistory', JSON.stringify(historyList));
    }

    // ==================== Compare Mode ====================
    let compareList = JSON.parse(localStorage.getItem('stdCompareList') || '[]');

    function toggleComparePanel() {
        const panel = document.getElementById('comparePanel');
        const overlay = document.getElementById('compareOverlay');
        panel.classList.toggle('open');
        overlay.classList.toggle('show');
        renderComparePanel();
    }

    function updateCompareBadge() {
        const badge = document.getElementById('compareBadge');
        const count = compareList.length;
        badge.textContent = count;
        badge.classList.toggle('show', count > 0);
    }

    function addToCompare(stdNo, categoryId) {
        // Check same category only
        if (compareList.length > 0 && compareList[0].categoryId !== categoryId) {
            alert('⚠️ 对比功能仅支持同一分类的零件，请先选择相同分类。');
            return;
        }
        if (compareList.length >= 6) {
            alert('⚠️ 最多同时对比6个规格。');
            return;
        }
        if (compareList.some(s => s.stdNo === stdNo)) {
            return; // already added
        }
        compareList.push({ stdNo, categoryId });
        localStorage.setItem('stdCompareList', JSON.stringify(compareList));
        updateCompareBadge();
        // Brief highlight
        const btn = document.getElementById('compareToggleBtn');
        btn.style.background = 'var(--accent-bg)';
        btn.style.borderColor = 'var(--accent)';
        setTimeout(() => {
            btn.style.background = '';
            btn.style.borderColor = '';
        }, 400);
    }

    function toggleCompareAdd(stdNo, categoryId) {
        const exists = compareList.some(s => s.stdNo === stdNo);
        if (exists) {
            removeFromCompare(stdNo);
        } else {
            addToCompare(stdNo, categoryId);
        }
        // Re-render model list to update button state
        if (currentCategory) {
            renderModelList(currentCategory);
        }
    }

    function removeFromCompare(stdNo) {
        compareList = compareList.filter(s => s.stdNo !== stdNo);
        localStorage.setItem('stdCompareList', JSON.stringify(compareList));
        updateCompareBadge();
        renderComparePanel();
    }

    function clearCompareList() {
        compareList = [];
        localStorage.setItem('stdCompareList', JSON.stringify(compareList));
        updateCompareBadge();
        renderComparePanel();
    }

    function openCompareInDetail() {
        if (compareList.length === 0) return;
        const { stdNo, categoryId } = compareList[0];
        toggleComparePanel();
        selectCategory(categoryId);
        selectStandard(stdNo, categoryId);
    }

    function renderComparePanel() {
        const body = document.getElementById('comparePanelBody');
        const countEl = document.getElementById('comparePanelCount');
        if (compareList.length === 0) {
            countEl.textContent = '';
            body.innerHTML = `
                <div class="compare-empty">
                    <div class="icon">⚖️</div>
                    <p>暂无对比项目</p>
                    <p style="font-size:12px;margin-top:8px;">点击列表中的 ⚡ 按钮添加规格进行对比</p>
                </div>`;
            return;
        }
        countEl.textContent = `(${compareList.length}/6)`;

        // Collect all items
        const items = compareList.map(s => {
            const grouped = groupedData[s.categoryId];
            const list = grouped ? grouped[s.stdNo] : [];
            return { stdNo: s.stdNo, categoryId: s.categoryId, items: list };
        }).filter(x => x.items.length > 0);

        if (items.length === 0) {
            body.innerHTML = '<div class="compare-empty"><div class="icon">⚠️</div><p>数据加载失败</p></div>';
            return;
        }

        // All unique params across all items
        const allParams = new Set();
        const allItemsFlat = [];
        items.forEach(group => {
            group.items.forEach(item => {
                allItemsFlat.push(item);
                (item.dimensions || []).forEach(d => allParams.add(d.param));
            });
        });
        const paramList = Array.from(allParams);

        // Build table: rows = params, cols = specs
        let tableHtml = `
        <div class="compare-table-wrap">
        <table class="compare-table">
            <thead>
                <tr>
                    <th style="min-width:100px;">参数</th>
                    ${items.map(g => `
                        <th>
                            <span class="compare-stdno">${g.stdNo}</span>
                            <button class="compare-remove" onclick="removeFromCompare('${g.stdNo}')" title="移除">×</button>
                        </th>`).join('')}
                </tr>
            </thead>
            <tbody>`;

        // Name row
        tableHtml += `<tr>
            <th style="color:var(--table-header);">名称</th>
            ${items.map(g => `<td class="compare-name" title="${g.items[0].name}">${g.items[0].name}</td>`).join('')}
        </tr>`;

        // Category row
        tableHtml += `<tr class="param-row">
            <th>分类</th>
            ${items.map(g => `<td>${g.items[0].category || ''}</td>`).join('')}
        </tr>`;

        // Each param row
        for (const param of paramList) {
            tableHtml += `<tr>
                <th style="color:var(--table-header);">${param}</th>
                ${items.map(g => {
                    // Try to find matching dimension (consider aliases)
                    const dim = g.items[0].dimensions?.find(d => d.param === param);
                    return `<td>${dim ? dim.value : '-'}</td>`;
                }).join('')}
            </tr>`;
        }

        // Description
        tableHtml += `<tr class="param-row">
            <th>说明</th>
            ${items.map(g => `<td style="font-size:11px;color:var(--text-muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;">${g.items[0].description || '-'}</td>`).join('')}
        </tr>`;

        tableHtml += '</tbody></table></div>';
        body.innerHTML = tableHtml;
    }

    // Patch selectStandard to add compare button
    const origSelectStandard = selectStandard;
    selectStandard = function(stdNo, catId) {
        origSelectStandard(stdNo, catId);
        updateCompareBadge();
    };

    // ==================== Init ====================
    function initStats() {
        let total = 0;
        const catCounts = {};
        for (const [catId, models] of Object.entries(standardsData)) {
            const count = models.length || 0;
            catCounts[catId] = count;
            total += count;
        }
        document.getElementById('totalCount').textContent = total.toLocaleString();
        document.getElementById('fastenerCount').textContent = (catCounts['fasteners'] || 0).toLocaleString();
        document.getElementById('flangeCount').textContent = (catCounts['flanges'] || 0).toLocaleString();
        document.getElementById('gasketCount').textContent = (catCounts['gaskets'] || 0).toLocaleString();
        document.getElementById('bearingCount').textContent = (catCounts['bearings'] || 0).toLocaleString();
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderCategories();
        initStats();
        updateCompareBadge();
        updateFavBadge();
        if (categories.length > 0) {
            selectCategory(categories[0].id);
        }
    });
    </script>
